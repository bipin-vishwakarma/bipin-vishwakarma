<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="1000" height="470" fill="none" role="img" aria-label="Tech stack">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="1000" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#04070a"/>
      <stop offset="0.55" stop-color="#06171b"/>
      <stop offset="1" stop-color="#0a2b30"/>
    </linearGradient>
    <style>
      .h { font-family:'Segoe UI',Verdana,Arial,sans-serif; font-weight:800; font-size:19px; letter-spacing:1px; }
      .c { font-family:'Consolas','Courier New',monospace; font-weight:600; font-size:15px; }
      .chip { rx:9; }
      .g1 .chip { fill:#0b2b31; stroke:#22d3ee; stroke-opacity:.45; }
      .g2 .chip { fill:#171235; stroke:#8b5cf6; stroke-opacity:.45; }
      .g3 .chip { fill:#2a1024; stroke:#ec4899; stroke-opacity:.45; }
      .pulse { animation: pl 3s ease-in-out infinite; }
      @keyframes pl { 0%,100%{opacity:.5} 50%{opacity:1} }
    </style>
  </defs>

  <rect width="1000" height="470" rx="16" fill="url(#tbg)"/>
  <g stroke="#22d3ee" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 78 H1000 M333 0 V470 M667 0 V470"/>
  </g>

  <!-- ============ COLUMN 1 : Hardware ============ -->
  <g class="g1">
    <!-- icon: IC chip -->
    <g transform="translate(40,34)" stroke="#22d3ee" stroke-width="2" fill="none">
      <rect x="4" y="4" width="20" height="20" rx="3" fill="#0b2b31"/>
      <path d="M4 10 H-1 M4 18 H-1 M24 10 H29 M24 18 H29 M10 4 V-1 M18 4 V-1 M10 24 V29 M18 24 V29"/>
    </g>
    <text x="80" y="52" class="h" fill="#e6fbff">Hardware &amp; Embedded</text>
    <rect x="80" y="62" width="150" height="3" rx="2" fill="#22d3ee" class="pulse"/>

    <rect class="chip" x="40" y="92"  width="250" height="42"/><text x="165" y="119" class="c" fill="#a5f3fc" text-anchor="middle">Arduino</text>
    <rect class="chip" x="40" y="146" width="250" height="42"/><text x="165" y="173" class="c" fill="#a5f3fc" text-anchor="middle">ESP32 · ESP32-S3</text>
    <rect class="chip" x="40" y="200" width="250" height="42"/><text x="165" y="227" class="c" fill="#a5f3fc" text-anchor="middle">KiCad</text>
    <rect class="chip" x="40" y="254" width="250" height="42"/><text x="165" y="281" class="c" fill="#a5f3fc" text-anchor="middle">PCB Design</text>
    <rect class="chip" x="40" y="308" width="250" height="42"/><text x="165" y="335" class="c" fill="#a5f3fc" text-anchor="middle">IoT &amp; Sensors</text>
    <rect class="chip" x="40" y="362" width="250" height="42"/><text x="165" y="389" class="c" fill="#a5f3fc" text-anchor="middle">SolidWorks</text>
  </g>

  <!-- ============ COLUMN 2 : AI & Software ============ -->
  <g class="g2">
    <!-- icon: neural nodes -->
    <g transform="translate(374,34)" stroke="#8b5cf6" stroke-width="2">
      <line x1="4" y1="6" x2="16" y2="14" stroke-opacity=".6"/>
      <line x1="4" y1="22" x2="16" y2="14" stroke-opacity=".6"/>
      <line x1="16" y1="14" x2="26" y2="6" stroke-opacity=".6"/>
      <line x1="16" y1="14" x2="26" y2="22" stroke-opacity=".6"/>
      <circle cx="4" cy="6" r="3" fill="#8b5cf6"/><circle cx="4" cy="22" r="3" fill="#8b5cf6"/>
      <circle cx="16" cy="14" r="3.5" fill="#a78bfa"/>
      <circle cx="26" cy="6" r="3" fill="#8b5cf6"/><circle cx="26" cy="22" r="3" fill="#8b5cf6"/>
    </g>
    <text x="414" y="52" class="h" fill="#e6fbff">AI &amp; Software</text>
    <rect x="414" y="62" width="120" height="3" rx="2" fill="#8b5cf6" class="pulse"/>

    <rect class="chip" x="374" y="92"  width="250" height="42"/><text x="499" y="119" class="c" fill="#ddd6fe" text-anchor="middle">Python</text>
    <rect class="chip" x="374" y="146" width="250" height="42"/><text x="499" y="173" class="c" fill="#ddd6fe" text-anchor="middle">FastAPI</text>
    <rect class="chip" x="374" y="200" width="250" height="42"/><text x="499" y="227" class="c" fill="#ddd6fe" text-anchor="middle">TensorFlow</text>
    <rect class="chip" x="374" y="254" width="250" height="42"/><text x="499" y="281" class="c" fill="#ddd6fe" text-anchor="middle">MediaPipe · OpenCV</text>
    <rect class="chip" x="374" y="308" width="250" height="42"/><text x="499" y="335" class="c" fill="#ddd6fe" text-anchor="middle">Streamlit</text>
    <rect class="chip" x="374" y="362" width="250" height="42"/><text x="499" y="389" class="c" fill="#ddd6fe" text-anchor="middle">AI Agents · APIs</text>
  </g>

  <!-- ============ COLUMN 3 : Biomedical ============ -->
  <g class="g3">
    <!-- icon: heart pulse -->
    <g transform="translate(708,34)">
      <path d="M4 20 L9 20 L12 12 L16 26 L20 8 L23 20 L28 20" stroke="#ec4899" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="748" y="52" class="h" fill="#e6fbff">Biomedical Systems</text>
    <rect x="748" y="62" width="140" height="3" rx="2" fill="#ec4899" class="pulse"/>

    <rect class="chip" x="708" y="92"  width="250" height="42"/><text x="833" y="119" class="c" fill="#fbcfe8" text-anchor="middle">MRI · PET-CT</text>
    <rect class="chip" x="708" y="146" width="250" height="42"/><text x="833" y="173" class="c" fill="#fbcfe8" text-anchor="middle">CT · X-Ray</text>
    <rect class="chip" x="708" y="200" width="250" height="42"/><text x="833" y="227" class="c" fill="#fbcfe8" text-anchor="middle">Ultrasound</text>
    <rect class="chip" x="708" y="254" width="250" height="42"/><text x="833" y="281" class="c" fill="#fbcfe8" text-anchor="middle">ECG · Monitoring</text>
    <rect class="chip" x="708" y="308" width="250" height="42"/><text x="833" y="335" class="c" fill="#fbcfe8" text-anchor="middle">Electrochemical</text>
    <rect class="chip" x="708" y="362" width="250" height="42"/><text x="833" y="389" class="c" fill="#fbcfe8" text-anchor="middle">High Voltage</text>
  </g>

  <!-- footer ecg accent -->
  <path d="M40 438 H360 l10 0 12 -14 10 26 12 -30 10 18 H960" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
