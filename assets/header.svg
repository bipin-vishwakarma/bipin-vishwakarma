<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" fill="none" role="img" aria-label="Bipin Vishwakarma - Biomedical Engineer, Embedded Hardware, AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#04070a"/><stop offset="0.5" stop-color="#06171b"/><stop offset="1" stop-color="#0a2b30"/>
    </linearGradient>
    <linearGradient id="cyanText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6fbff"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e7490" stop-opacity="0"/><stop offset="0.5" stop-color="#22d3ee"/><stop offset="1" stop-color="#67e8f9" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.32"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="dnaClip"><rect x="990" y="20" width="120" height="300" rx="10"/></clipPath>
    <style>
      .twk { animation: tw 3s ease-in-out infinite; } .twk2 { animation: tw 4.2s ease-in-out infinite; } .twk3 { animation: tw 2.4s ease-in-out infinite; }
      @keyframes tw { 0%,100%{opacity:.15} 50%{opacity:.9} }
      .pulse { stroke-dasharray: 55 1545; stroke-dashoffset: 1600; animation: draw 3.4s linear infinite; }
      @keyframes draw { 0%{stroke-dashoffset:1600} 100%{stroke-dashoffset:0} }
      .dna { animation: spin 5.5s linear infinite; }
      @keyframes spin { from{transform:translateY(0)} to{transform:translateY(-120px)} }
      .rise { animation: rise 5s ease-in-out infinite; }
      @keyframes rise { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    </style>
  </defs>

  <rect width="1200" height="340" rx="16" fill="url(#bg)"/>
  <ellipse cx="600" cy="180" rx="620" ry="220" fill="url(#glow)"/>

